name: nailx
description: UGC nail design platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Firebase
  firebase_core: ^2.30.1
  firebase_auth: ^4.19.5
  firebase_messaging: ^14.9.0
  firebase_ui_auth: ^1.12.0

  # Local storage
  hive_flutter: ^1.1.0

  # UI utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1

  # Realtime（SSE は http パッケージの streaming API で実装）
  # eventsource は http ^0.13.3 に依存しており flutter_svg と競合するため除外

  # Misc
  intl: ^0.19.0
  uuid: ^4.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  envied: ^0.5.4+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
